<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>瑶光团战积分系统</title>
<style>
  /* ===== 全局重置 ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d1f;
    --bg2: #13132b;
    --card: #1a1a35;
    --card2: #22224a;
    --nav: #111128;
    --gold: #C8A84B;
    --gold2: #e8c867;
    --text: #e8e8f0;
    --text2: #9999bb;
    --border: rgba(200,168,75,0.18);
    --radius: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 14px; overflow: hidden; }

  /* ===== 布局容器 ===== */
  #app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; position: relative; background: var(--bg); box-shadow: 0 0 40px rgba(0,0,0,0.6); }

  /* ===== 内容区域 ===== */
  .page-content { flex: 1; overflow-y: auto; padding-bottom: 70px; }
  .page-content::-webkit-scrollbar { display: none; }

  /* ===== 顶部导航栏 ===== */
  .topbar { background: #111128; padding: 14px 16px 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .topbar-back { width: 32px; height: 32px; border-radius: 50%; background: rgba(200,168,75,0.15); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--gold); font-size: 16px; }
  .topbar-title { font-size: 16px; font-weight: 700; color: var(--text); }

  /* ===== 底部TabBar ===== */
  #tabbar { background: var(--nav); border-top: 1px solid var(--border); display: flex; position: sticky; bottom: 0; z-index: 200; flex-shrink: 0; }
  .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 8px; cursor: pointer; transition: color 0.2s; color: #666688; gap: 3px; }
  .tab-item.active { color: var(--gold); }
  .tab-item .tab-icon { font-size: 20px; }
  .tab-item .tab-label { font-size: 11px; font-weight: 500; }

  /* ===== 通用卡片 ===== */
  .card { background: var(--card); border-radius: var(--radius); padding: 16px; margin: 10px 14px; box-shadow: var(--shadow); border: 1px solid var(--border); }
  .section { margin: 0 0 4px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 14px 6px; }
  .section-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .section-tag { font-size: 11px; color: var(--text2); }
  .more-btn { font-size: 12px; color: var(--gold); cursor: pointer; }

  /* ===== 搜索框 ===== */
  .search-box { margin: 10px 14px; position: relative; }
  .search-input { width: 100%; padding: 10px 14px 10px 36px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; color: var(--text); font-size: 13px; outline: none; }
  .search-input::placeholder { color: var(--text2); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); }

  /* ===== 主页核心成员 ===== */
  .core-card { display: flex; align-items: center; gap: 12px; padding: 12px 0; }
  .core-card + .core-card { border-top: 1px solid var(--border); }
  .core-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--gold) 0%, #8B6914 100%); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .core-info { flex: 1; }
  .core-role { font-size: 11px; color: var(--gold); font-weight: 600; margin-bottom: 2px; }
  .core-name { font-size: 14px; font-weight: 600; }
  .core-team { font-size: 11px; color: var(--text2); }

  /* ===== 战队列表 ===== */
  .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .team-item { background: var(--card2); border-radius: 12px; padding: 14px 12px; cursor: pointer; transition: transform 0.15s; border: 1px solid var(--border); }
  .team-item:active { transform: scale(0.97); }
  .team-name { font-size: 13px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .team-badge { background: var(--gold); color: #000; font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 4px; }
  .team-stats { display: flex; gap: 10px; }
  .team-stat { font-size: 11px; color: var(--text2); }
  .team-stat span { color: var(--text); font-weight: 600; }

  /* ===== 战队详情 ===== */
  .team-header { display: flex; align-items: center; gap: 14px; padding: 20px 14px; }
  .team-avatar-lg { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, var(--gold) 0%, #8B6914 100%); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  .team-meta { flex: 1; }
  .team-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
  .team-summary { font-size: 12px; color: var(--text2); }
  .team-summary span { color: var(--gold); font-weight: 700; }
  .member-list { }
  .member-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; }
  .member-row + .member-row { border-top: 1px solid rgba(200,168,75,0.1); }
  .member-rank { font-size: 12px; font-weight: 700; color: var(--text2); width: 24px; text-align: center; }
  .member-avatar-sm { width: 36px; height: 36px; border-radius: 50%; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .member-name { font-size: 14px; font-weight: 600; flex: 1; }
  .member-job { font-size: 11px; color: var(--gold); }
  .member-score { font-size: 16px; font-weight: 800; color: var(--gold2); }
  .member-games { font-size: 11px; color: var(--text2); text-align: right; }

  /* ===== 排行榜 ===== */
  .rank-tabs { display: flex; background: var(--nav); border-radius: 10px; padding: 3px; margin: 10px 14px; }
  .rank-tab { flex: 1; text-align: center; padding: 8px 0; font-size: 13px; font-weight: 600; color: var(--text2); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .rank-tab.active { background: var(--gold); color: #000; }
  .rank-list { }
  .rank-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; }
  .rank-row + .rank-row { border-top: 1px solid rgba(200,168,75,0.1); }
  .rank-num { font-size: 14px; font-weight: 800; width: 28px; text-align: center; }
  .rank-medal { font-size: 18px; }
  .rank-icon { font-size: 16px; width: 28px; text-align: center; }
  .rank-name { font-size: 13px; font-weight: 600; flex: 1; }
  .rank-team { font-size: 10px; color: var(--text2); flex: 1; }
  .rank-score { font-size: 15px; font-weight: 800; color: var(--gold2); }
  .rank-games { font-size: 10px; color: var(--text2); }

  /* ===== 最近战绩 ===== */
  .act-card { }
  .act-row { display: flex; gap: 10px; padding: 8px 0; }
  .act-row + .act-row { border-top: 1px solid rgba(200,168,75,0.1); }
  .act-date { font-size: 11px; color: var(--text2); width: 50px; flex-shrink: 0; }
  .act-info { flex: 1; }
  .act-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .act-team { font-size: 10px; color: var(--text2); }
  .act-result { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 700; color: #4CAF50; }
  .act-result-score { color: var(--gold2); font-size: 15px; }

  /* ===== 空状态 ===== */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text2); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* ===== 间距 ===== */
  .spacer { height: 10px; }
</style>
</head>

/* ==================== 辅助函数 ==================== */
function getRecordByName(name) {
  return records.find(r => r.name === name);
}

function getTeamById(id) {
  return teams.find(t => t.id === id);
}

function getTeamByName(name) {
  return teams.find(t => t.name === name);
}

function getNameFirstChar(name) {
  return name.charAt(0);
}

/* ==================== 渲染函数 ==================== */
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'class') el.className = v;
    else if (k === 'onclick') el.onclick = v;
    else el.setAttribute(k, v);
  }
  children.forEach(child => {
    if (typeof child === 'string') el.appendChild(document.createTextNode(child));
    else if (child) el.appendChild(child);
  });
  return el;
}

/* ==================== 首页渲染 ==================== */

  const frag = document.createDocumentFragment();

  // 核心成员

        h('div', { class: 'core-name' }, cr.name),
        h('div', { class: 'core-team' }, cr.team)
      )
    ));
  });

  // 战队总览
  frag.appendChild(h('div', { class: 'section-header' },
    h('div', { class: 'section-title' }, '⚔️ 战队总览'),
    h('span', { class: 'section-tag' }, teams.length + '支战队 · ' + records.length + '名成员')
  ));

  const grid = h('div', { class: 'team-grid' });
  teams.forEach(team => {
    const teamRecords = records.filter(r => r.team === team.name);
    const totalScore = teamRecords.reduce((sum, r) => sum + r.score, 0);
    const item = h('div', { class: 'team-item', onclick: () => goTeamDetail(team.id) },
      h('div', { class: 'team-name' },
        h('span', {}, team.icon),
        h('span', {}, team.name),
        team.captain ? h('span', { class: 'team-badge' }, '长') : null
      ),
      h('div', { class: 'team-stats' },
        h('div', { class: 'team-stat' }, '积分 ', h('span', {}, totalScore)),
        h('div', { class: 'team-stat' }, '人数 ', h('span', {}, team.members.length))
      )
    );
    grid.appendChild(item);
  });
  frag.appendChild(grid);

  // 个人排行TOP5
  const top5 = [...records].sort((a, b) => b.score - a.score).slice(0, 5);
  frag.appendChild(h('div', { class: 'section-header' },
    h('div', { class: 'section-title' }, '🏆 个人排行 TOP5'),
    h('span', { class: 'more-btn', onclick: () => switchTab('ranking') }, '查看全部 ›')
  ));

  const rankCard = h('div', { class: 'card' });
  top5.forEach((r, i) => {
    const medals = ['🥇', '🥈', '🥉'];
    const icons = ['🐰', '🔥', '⚡', '🌟', '💀'];
    rankCard.appendChild(h('div', { class: 'rank-row' },
      h('div', { class: 'rank-medal' }, medals[i] || icons[i] || '🏅'),
      h('div', { class: 'rank-icon' }, getNameFirstChar(r.name)),
      h('div', { class: 'rank-name' }, r.name),
      h('div', { class: 'rank-team' }, r.team + ' · ' + r.job),
      h('div', { class: 'rank-score' }, r.score)
    ));
  });
  frag.appendChild(rankCard);

  frag.appendChild(h('div', { class: 'spacer' }));
  return frag;
}

/* ==================== 战队列表渲染 ==================== */
function renderTeams(keyword) {
  const frag = document.createDocumentFragment();

  // 搜索
  frag.appendChild(h('div', { class: 'search-box' },
    h('span', { class: 'search-icon' }, '🔍'),
    h('input', {
      type: 'text',
      class: 'search-input',
      placeholder: '搜索战队名称...',
      value: keyword || '',
      oninput: (e) => { searchKeyword = e.target.value; rerenderTeams(searchKeyword); }
    })
  ));

  const filtered = keyword
    ? teams.filter(t => t.name.includes(keyword))
    : teams;

  if (filtered.length === 0) {
    frag.appendChild(h('div', { class: 'empty-state' },
      h('div', { class: 'empty-icon' }, '🔍'),
      h('div', { class: 'empty-text' }, '未找到匹配的战队')
    ));
  } else {
    const grid = h('div', { class: 'team-grid' });
    filtered.forEach(team => {
      const teamRecords = records.filter(r => r.team === team.name);
      const totalScore = teamRecords.reduce((sum, r) => sum + r.score, 0);
      grid.appendChild(h('div', { class: 'team-item', onclick: () => goTeamDetail(team.id) },
        h('div', { class: 'team-name' },
          h('span', {}, team.icon),
          h('span', {}, team.name),
          team.captain ? h('span', { class: 'team-badge' }, '长') : null
        ),
        h('div', { class: 'team-stats' },
          h('div', { class: 'team-stat' }, '积分 ', h('span', {}, totalScore)),
          h('div', { class: 'team-stat' }, '人数 ', h('span', {}, team.members.length))
        )
      ));
    });
    frag.appendChild(grid);
  }

  frag.appendChild(h('div', { class: 'spacer' }));
  return frag;
}

let searchKeyword = '';

function rerenderTeams(keyword) {
  const pc = document.getElementById('page-content');
  pc.innerHTML = '';
  pc.appendChild(renderTeams(keyword));
  pc.scrollTop = 0;
}

/* ==================== 战队详情渲染 ==================== */
function renderTeamDetail(teamId) {
  const frag = document.createDocumentFragment();
  const team = getTeamById(teamId);
  if (!team) return frag;

  const teamRecords = records.filter(r => r.team === team.name).sort((a, b) => b.score - a.score);
  const totalScore = teamRecords.reduce((sum, r) => sum + r.score, 0);

  // 战队头部
  frag.appendChild(h('div', { class: 'team-header' },
    h('div', { class: 'team-avatar-lg' }, team.icon),
    h('div', { class: 'team-meta' },
      h('div', { class: 'team-title' }, team.name),
      h('div', { class: 'team-summary' },
        '总积分 ', h('span', {}, totalScore), ' · ',
        h('span', {}, teamRecords.length), ' 名成员'
      )
    )
  ));

  // 成员列表
  frag.appendChild(h('div', { class: 'section-title' }, '成员列表'));
  const memberList = h('div', { class: 'card member-list' });
  teamRecords.forEach((r, i) => {
    memberList.appendChild(h('div', { class: 'member-row' },
      h('div', { class: 'member-rank' }, '#' + (i + 1)),
      h('div', { class: 'member-avatar-sm' }, getNameFirstChar(r.name)),
      h('div', { class: 'member-name' }, r.name),
      h('div', { class: 'member-job' }, r.job),
      h('div', { style: 'text-align:right' },
        h('div', { class: 'member-score' }, r.score),
        h('div', { class: 'member-games' }, r.games + '场')
      )
    ));
  });
  frag.appendChild(memberList);

  frag.appendChild(h('div', { class: 'spacer' }));
  return frag;
}

/* ==================== 排行榜渲染 ==================== */
let rankTab = 'personal';
let navStack = [];
let currentTab = 'home';

function renderRanking(tab) {
  const frag = document.createDocumentFragment();

  // Tab切换
  frag.appendChild(h('div', { class: 'rank-tabs' },
    h('div', { class: 'rank-tab' + (tab === 'personal' ? ' active' : ''), onclick: () => setRankTab('personal') }, '个人'),
    h('div', { class: 'rank-tab' + (tab === 'team' ? ' active' : ''), onclick: () => setRankTab('team') }, '战队')
  ));

  if (tab === 'personal') {
    // 个人排行榜
    const sorted = [...records].sort((a, b) => b.score - a.score);
    const medals = ['🥇', '🥈', '🥉'];
    const icons = ['🐰', '🔥', '⚡', '🌟', '💀', '🌸', '❄️', '🎵', '🔮', '⚙️'];
    
    const list = h('div', { class: 'rank-list card' });
    sorted.forEach((r, i) => {
      const rankNum = i + 1;
      const icon = medals[i] || icons[i % icons.length] || '🏅';
      list.appendChild(h('div', { class: 'rank-row' },
        h('div', { class: 'rank-num' }, medals[i] ? '' : rankNum),
        h('div', { class: 'rank-icon' }, icon),
        h('div', { class: 'rank-name' }, r.name),
        h('div', { class: 'rank-team' }, r.team),
        h('div', { style: 'text-align:right' },
          h('div', { class: 'rank-score' }, r.score),
          h('div', { class: 'rank-games' }, r.games + '场')
        )
      ));
    });
    frag.appendChild(list);
  } else {
    // 战队排行榜
    const teamScores = teams.map(t => {
      const teamRecords = records.filter(r => r.team === t.name);
      const totalScore = teamRecords.reduce((sum, r) => sum + r.score, 0);
      return { ...t, totalScore, memberCount: teamRecords.length };
    }).sort((a, b) => b.totalScore - a.totalScore);

    const medals = ['🥇', '🥈', '🥉'];
    const icons = ['🐰', '🔥', '⚡', '🌟', '💀', '🌸', '❄️', '🎵', '🔮', '⚙️'];

    const list = h('div', { class: 'rank-list card' });
    teamScores.forEach((t, i) => {
      const icon = medals[i] || icons[i % icons.length] || '🏅';
      list.appendChild(h('div', { class: 'rank-row', onclick: () => goTeamDetail(t.id) },
        h('div', { class: 'rank-num' }, medals[i] ? '' : i + 1),
        h('div', { class: 'rank-icon' }, icon),
        h('div', { class: 'rank-name' }, t.name + (t.captain ? ' ⭐' : '')),
        h('div', { class: 'rank-team' }, t.memberCount + '人'),
        h('div', { style: 'text-align:right' },
          h('div', { class: 'rank-score' }, t.totalScore),
          h('div', { class: 'rank-games' }, '总积分')
        )
      ));
    });
    frag.appendChild(list);

    // 战队战绩
    frag.appendChild(h('div', { class: 'section-title' }, '战队战绩'));
    const actCard = h('div', { class: 'card act-card' });
    teamScores.slice(0, 8).forEach(ts => {
      actCard.appendChild(h('div', { class: 'act-row' },
        h('div', { class: 'act-date' }, '3.21'),
        h('div', { class: 'act-info' },
          h('div', { class: 'act-name' }, ts.name),
          h('div', { class: 'act-team' }, ts.icon + ' ' + ts.captain + ' 战队')
        ),
        h('div', { class: 'act-result' },
          h('span', {}, '战队'),
          h('span', { class: 'act-result-score' }, '+' + ts.score)
        )
      ));
    });
    list.appendChild(actCard);
  }

  frag.appendChild(h('div', { class: 'spacer' }));
  return frag;
}

function rerenderRanking(tab) {
  rankTab = tab;
  const pc = document.getElementById('page-content');
  pc.innerHTML = '';
  pc.appendChild(renderRanking(tab));
  pc.scrollTop = 0;
}

function setRankTab(tab) {
  rerenderRanking(tab);
}

/* ==================== 路由 ==================== */
function switchTab(tab) {
  currentTab = tab;
  navStack = [];
  searchKeyword = '';

  // 更新tabbar
  document.querySelectorAll('.tab-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });

  // 隐藏/显示顶部栏
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('tabbar').style.display = 'flex';

  render();
}

function goTeamDetail(teamId) {
  navStack.push({ type: 'team-detail', teamId });
  document.getElementById('topbar').style.display = 'flex';
  const team = getTeamById(teamId);
  document.getElementById('topbar-title').textContent = team ? team.name : '战队详情';

  // 隐藏tabbar（详情页沉浸式体验，可选：保留）
  // document.getElementById('tabbar').style.display = 'none';

  const pc = document.getElementById('page-content');
  pc.innerHTML = '';
  pc.appendChild(renderTeamDetail(teamId));
  pc.scrollTop = 0;
}

function goBack() {
  navStack.pop();
  if (navStack.length === 0) {
    document.getElementById('topbar').style.display = 'none';
    document.getElementById('tabbar').style.display = 'flex';
    render();
  } else {
    const last = navStack[navStack.length - 1];
    if (last.type === 'team-detail') goTeamDetail(last.teamId);
  }
}

function render() {
  const pc = document.getElementById('page-content');
  pc.innerHTML = '';
  pc.scrollTop = 0;

  if (currentTab === 'home') {
    pc.appendChild(renderHome());
  } else if (currentTab === 'teams') {
    pc.appendChild(renderTeams(searchKeyword));
  } else if (currentTab === 'ranking') {
    pc.appendChild(renderRanking(rankTab));
  }
}

/* ==================== 初始化 ==================== */
/* v20260322 */
render();
</script>

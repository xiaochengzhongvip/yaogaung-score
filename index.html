  { name: 'з»ӮиҜІоҹ·з”Ҝпёҝз¬Ғжҝһ?, team: 'з»—оғҝзҜҖй—ғ?, job: 'йҚҷеұҪеһҒ', score: 25, games: 10 },
  { name: 'йҸҲиҠҘзҹҸ', team: 'з»—о„Җеҙ„й—ғ?, job: 'йҗўйқӣзҙҰ', score: 23, games: 10 },
  { name: 'зҖ№еӣ§з•ҪеЁҙоҒ„з“ҷ', team: 'з»—о„Җеҙ„й—ғ?, job: 'йҚҷеұҪеһҒ', score: 23, games: 10 },
  { name: 'йҚҗжҺ”еўқжҫ¶в•ғоҡЈ', team: 'з»—о„Җеҙ„й—ғ?, job: 'еҰ«жЁ»в…ө', score: 23, games: 10 },
  { name: 'йҺ¬жҺ”жӮҲ', team: 'з»—о„Җеҙ„й—ғ?, job: 'йҚҷеұҪеһҒ', score: 23, games: 10 }
];

const coreRoles = [
  { role: 'йҚҘгҲӨжҡұ', name: 'ж¶“вӮ¬йҸӮеҪ’вӮ¬ж°іо”‘', team: 'з»—оғҝз°Ій—ғ? },
  { role: 'йҚ“оҲҡжҙҹй—Җ?, name: 'й“ҰеәЎз“ҷй‘ҫиҫ«е№Ҳ', team: 'з»—оғҝз°Ій—ғ? },
  { role: 'й–ІжҲңеҜҢ', name: 'й”ңжҲЈзҖӯйҺӯе •ж№ј', team: 'з»—оғҝз°Ій—ғ? },
  { role: 'жҫ¶ж Ұж°Ұ', name: 'KKйҠҶдҪөвӮ¬?, team: 'з»—оғҝз°Ій—ғ? }
];

/* ==================== жқҲе‘ӯе§ӘйҚ‘иҠҘжҡҹ ==================== */
function getRecordByName(name) {
  return records.find(r => r.name === name);
}

function getTeamById(id) {
  return teams.find(t => t.id === id);
}

function getTeamByName(name) {
  return teams.find(t => t.name === name);
}

function getNameFirstChar(name) {
  return name.charAt(0);
}

/* ==================== еЁ“еҸүз…ӢйҚ‘иҠҘжҡҹ ==================== */
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'class') el.className = v;
    else if (k === 'onclick') el.onclick = v;
    else el.setAttribute(k, v);
  }
  children.forEach(child => {
    if (typeof child === 'string') el.appendChild(document.createTextNode(child));
    else if (child) el.appendChild(child);
  });
  return el;
}

/* ==================== жЈЈж ӯгҖүеЁ“еҸүз…Ӣ ==================== */
function renderHome() {
  const frag = document.createDocumentFragment();

  // йҸҚзЁҝзёҫйҺҙж„¬жҶі
  frag.appendChild(h('div', { class: 'section-header' },
    h('div', { class: 'section-title' }, 'йҲҝж»җз¬Қ йҸҚзЁҝзёҫйҺҙж„¬жҶі'),
    h('span', { class: 'section-tag' }, '2026з’§ж¶ҳо„ң')
  ));

  const coreCard = h('div', { class: 'card' });
  coreRoles.forEach((cr, i) => {
    coreCard.appendChild(h('div', { class: 'core-card' },
      h('div', { class: 'core-avatar' }, getNameFirstChar(cr.name)),
      h('div', { class: 'core-info' },
        h('div', { class: 'core-role' }, cr.role),
        h('div', { class: 'core-name' }, cr.name),
        h('div', { class: 'core-team' }, cr.team)
      )
    ));
  });
  frag.appendChild(coreCard);

  // йҺҙж©Җж§ҰйҺ¬жҳҸоқҚ
  frag.appendChild(h('div', { class: 'section-header' },
    h('div', { class: 'section-title' }, 'йҲҝж—“з¬Қ йҺҙж©Җж§ҰйҺ¬жҳҸоқҚ'),
    h('span', { class: 'section-tag' }, teams.length + 'йҸҖоҲӣеһ¬й—ғ?и·Ҝ ' + records.length + 'йҚҡе¶ҶеһҡйҚӣ?)
  ));

  const grid = h('div', { class: 'team-grid' });
  teams.forEach(team => {
    const teamRecords = records.filter(r => r.team === team.name);
    const totalScore = teamRecords.reduce((sum, r) => sum + r.score, 0);
    const item = h('div', { class: 'team-item', onclick: () => goTeamDetail(team.id) },
      h('div', { class: 'team-name' },
        h('span', {}, team.icon),
        h('span', {}, team.name),
        team.captain ? h('span', { class: 'team-badge' }, 'й—Җ?) : null
      ),
      h('div', { class: 'team-stats' },
        h('div', { class: 'team-stat' }, 'з»үоҲҡеһҺ ', h('span', {}, totalScore)),
        h('div', { class: 'team-stat' }, 'жөңзғҳжҡҹ ', h('span', {}, team.members.length))
      )
    );
    grid.appendChild(item);
  });
  frag.appendChild(grid);

  // ж¶“оҒғжұүйҺәжҺ•о”‘TOP5
  const top5 = [...records].sort((a, b) => b.score - a.score).slice(0, 5);
  frag.appendChild(h('div', { class: 'section-header' },
    h('div', { class: 'section-title' }, 'йҰғејі ж¶“оҒғжұүйҺәжҺ•о”‘ TOP5'),
    h('span', { class: 'more-btn', onclick: () => switchTab('ranking') }, 'йҸҢгғ§ж№…йҚҸг„©е„ҙ йҲҘ?)
  ));

  const rankCard = h('div', { class: 'card' });
  top5.forEach((r, i) => {
    const medals = ['йҰғоҡҢ', 'йҰғоҡҚ', 'йҰғоҡҺ'];
    const icons = ['йҰғжғҸ', 'йҰғж•ҹ', 'йҲҝ?, 'йҰғе°Ӯ', 'йҰғжӢғ'];
    rankCard.appendChild(h('div', { class: 'rank-row' },
      h('div', { class: 'rank-medal' }, medals[i] || icons[i] || 'йҰғејІ'),
      h('div', { class: 'rank-icon' }, getNameFirstChar(r.name)),
      h('div', { class: 'rank-name' }, r.name),
      h('div', { class: 'rank-team' }, r.team + ' и·Ҝ ' + r.job),
      h('div', { class: 'rank-score' }, r.score)
    ));
  });
  frag.appendChild(rankCard);

  frag.appendChild(h('div', { class: 'spacer' }));
  return frag;
}

/* ==================== йҺҙж©Җж§ҰйҚ’жҘ„гҖғеЁ“еҸүз…Ӣ ==================== */
function renderTeams(keyword) {
  const frag = document.createDocumentFragment();

  // йҺјж»…еӮЁ
  frag.appendChild(h('div', { class: 'search-box' },
    h('span', { class: 'search-icon' }, 'йҰғж”і'),
    h('input', {
      type: 'text',
      class: 'search-input',
      placeholder: 'йҺјж»…еӮЁйҺҙж©Җж§ҰйҚҡе¶ҮРһ...',
      value: keyword || '',
      oninput: (e) => { searchKeyword = e.target.value; rerenderTeams(searchKeyword); }
    })
  ));

  const filtered = keyword
    ? teams.filter(t => t.name.includes(keyword))
    : teams;

  if (filtered.length === 0) {
    frag.appendChild(h('div', { class: 'empty-state' },
      h('div', { class: 'empty-icon' }, 'йҰғж”і'),
      h('div', { class: 'empty-text' }, 'йҸҲоҒ…еЈҳйҚ’жқҝе°®й–°е¶Үж®‘йҺҙж©Җж§Ұ')
    ));
  } else {
    const grid = h('div', { class: 'team-grid' });
    filtered.forEach(team => {
      const teamRecords = records.filter(r => r.team === team.name);
      const totalScore = teamRecords.reduce((sum, r) => sum + r.score, 0);
      grid.appendChild(h('div', { class: 'team-item', onclick: () => goTeamDetail(team.id) },
        h('div', { class: 'team-name' },
          h('span', {}, team.icon),
          h('span', {}, team.name),
          team.captain ? h('span', { class: 'team-badge' }, 'й—Җ?) : null
        ),
        h('div', { class: 'team-stats' },
          h('div', { class: 'team-stat' }, 'з»үоҲҡеһҺ ', h('span', {}, totalScore)),
          h('div', { class: 'team-stat' }, 'жөңзғҳжҡҹ ', h('span', {}, team.members.length))
        )
      ));
    });
    frag.appendChild(grid);
  }

  frag.appendChild(h('div', { class: 'spacer' }));
  return frag;
}

let searchKeyword = '';

function rerenderTeams(keyword) {
  const pc = document.getElementById('page-content');
  pc.innerHTML = '';
  pc.appendChild(renderTeams(keyword));
  pc.scrollTop = 0;
}

/* ==================== йҺҙж©Җж§Ұз’ҮпёҪе„ҸеЁ“еҸүз…Ӣ ==================== */
function renderTeamDetail(teamId) {
  const frag = document.createDocumentFragment();
  const team = getTeamById(teamId);
  if (!team) return frag;

  const teamRecords = records.filter(r => r.team === team.name).sort((a, b) => b.score - a.score);
  const totalScore = teamRecords.reduce((sum, r) => sum + r.score, 0);

  // йҺҙж©Җж§Ұжҫ¶ж’®е„ҙ
  frag.appendChild(h('div', { class: 'team-header' },
    h('div', { class: 'team-avatar-lg' }, team.icon),
    h('div', { class: 'team-meta' },
      h('div', { class: 'team-title' }, team.name),
      h('div', { class: 'team-summary' },
        'йҺ¬иҚӨРқйҚ’?', h('span', {}, totalScore), ' и·Ҝ ',
        h('span', {}, teamRecords.length), ' йҚҡе¶ҶеһҡйҚӣ?
      )
    )
  ));

  // йҺҙж„¬жҶійҚ’жҘ„гҖғ
  frag.appendChild(h('div', { class: 'section-title' }, 'йҺҙж„¬жҶійҚ’жҘ„гҖғ'));
  const memberList = h('div', { class: 'card member-list' });
  teamRecords.forEach((r, i) => {
    memberList.appendChild(h('div', { class: 'member-row' },
      h('div', { class: 'member-rank' }, '#' + (i + 1)),
      h('div', { class: 'member-avatar-sm' }, getNameFirstChar(r.name)),
      h('div', { class: 'member-name' }, r.name),
      h('div', { class: 'member-job' }, r.job),
      h('div', { style: 'text-align:right' },
        h('div', { class: 'member-score' }, r.score),
        h('div', { class: 'member-games' }, r.games + 'йҚҰ?)
      )
    ));
  });
  frag.appendChild(memberList);

  frag.appendChild(h('div', { class: 'spacer' }));
  return frag;
}

/* ==================== йҺәжҺ•о”‘е§’ж»„иҰҶйҸҢ?==================== */
let rankTab = 'personal';
let navStack = [];
let currentTab = 'home';

function renderRanking(tab) {
  const frag = document.createDocumentFragment();

  // TabйҚ’еӣЁеҙІ
  frag.appendChild(h('div', { class: 'rank-tabs' },
    h('div', { class: 'rank-tab' + (tab === 'personal' ? ' active' : ''), onclick: () => setRankTab('personal') }, 'ж¶“оҒғжұү'),
    h('div', { class: 'rank-tab' + (tab === 'team' ? ' active' : ''), onclick: () => setRankTab('team') }, 'йҺҙж©Җж§Ұ')
  ));

  if (tab === 'personal') {
    // ж¶“оҒғжұүйҺәжҺ•о”‘е§’?
    const sorted = [...records].sort((a, b) => b.score - a.score);
    const medals = ['йҰғоҡҢ', 'йҰғоҡҚ', 'йҰғоҡҺ'];
    const icons = ['йҰғжғҸ', 'йҰғж•ҹ', 'йҲҝ?, 'йҰғе°Ӯ', 'йҰғжӢғ', 'йҰғе°ӯ', 'йүӮеӢ¶з¬Қ', 'йҰғе№Қ', 'йҰғж•ӯ', 'йҲҝж¬ҷз¬Қ'];
    
    const list = h('div', { class: 'rank-list card' });
    sorted.forEach((r, i) => {
      const rankNum = i + 1;
      const icon = medals[i] || icons[i % icons.length] || 'йҰғејІ';
      list.appendChild(h('div', { class: 'rank-row' },
        h('div', { class: 'rank-num' }, medals[i] ? '' : rankNum),
        h('div', { class: 'rank-icon' }, icon),
        h('div', { class: 'rank-name' }, r.name),
        h('div', { class: 'rank-team' }, r.team),
        h('div', { style: 'text-align:right' },
          h('div', { class: 'rank-score' }, r.score),
          h('div', { class: 'rank-games' }, r.games + 'йҚҰ?)
        )
      ));
    });
    frag.appendChild(list);
  } else {
    // йҺҙж©Җж§ҰйҺәжҺ•о”‘е§’?
    const teamScores = teams.map(t => {
      const teamRecords = records.filter(r => r.team === t.name);
      const totalScore = teamRecords.reduce((sum, r) => sum + r.score, 0);
      return { ...t, totalScore, memberCount: teamRecords.length };
    }).sort((a, b) => b.totalScore - a.totalScore);

    const medals = ['йҰғоҡҢ', 'йҰғоҡҚ', 'йҰғоҡҺ'];
    const icons = ['йҰғжғҸ', 'йҰғж•ҹ', 'йҲҝ?, 'йҰғе°Ӯ', 'йҰғжӢғ', 'йҰғе°ӯ', 'йүӮеӢ¶з¬Қ', 'йҰғе№Қ', 'йҰғж•ӯ', 'йҲҝж¬ҷз¬Қ'];

    const list = h('div', { class: 'rank-list card' });
    teamScores.forEach((t, i) => {
      const icon = medals[i] || icons[i % icons.length] || 'йҰғејІ';
      list.appendChild(h('div', { class: 'rank-row', onclick: () => goTeamDetail(t.id) },
        h('div', { class: 'rank-num' }, medals[i] ? '' : i + 1),
        h('div', { class: 'rank-icon' }, icon),
        h('div', { class: 'rank-name' }, t.name + (t.captain ? ' зҢё? : '')),
        h('div', { class: 'rank-team' }, t.memberCount + 'жөң?),
        h('div', { style: 'text-align:right' },
          h('div', { class: 'rank-score' }, t.totalScore),
          h('div', { class: 'rank-games' }, 'йҺ¬иҚӨРқйҚ’?)
        )
      ));
    });
    frag.appendChild(list);

    // йҺҙж©Җж§ҰйҺҙжЁје“—
    frag.appendChild(h('div', { class: 'section-title' }, 'йҺҙж©Җж§ҰйҺҙжЁје“—'));
    const actCard = h('div', { class: 'card act-card' });
    teamScores.slice(0, 8).forEach(ts => {
      actCard.appendChild(h('div', { class: 'act-row' },
        h('div', { class: 'act-date' }, '3.21'),
        h('div', { class: 'act-info' },
          h('div', { class: 'act-name' }, ts.name),
          h('div', { class: 'act-team' }, ts.icon + ' ' + ts.captain + ' йҺҙж©Җж§Ұ')
        ),
        h('div', { class: 'act-result' },
          h('span', {}, 'йҺҙж©Җж§Ұ'),
          h('span', { class: 'act-result-score' }, '+' + ts.score)
        )
      ));
    });
    list.appendChild(actCard);
  }

  frag.appendChild(h('div', { class: 'spacer' }));
  return frag;
}

function rerenderRanking(tab) {
  rankTab = tab;
  const pc = document.getElementById('page-content');
  pc.innerHTML = '';
  pc.appendChild(renderRanking(tab));
  pc.scrollTop = 0;
}

function setRankTab(tab) {
  rerenderRanking(tab);
}

/* ==================== з’әоҲңж•ұ ==================== */
function switchTab(tab) {
  currentTab = tab;
  navStack = [];
  searchKeyword = '';

  // йҸҮеӯҳжҹҠtabbar
  document.querySelectorAll('.tab-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });

  // й—…ж„ҜжЈҢ/йҸ„еү§гҒҡжӨӨе •е„ҙйҸҚ?
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('tabbar').style.display = 'flex';

  render();
}

function goTeamDetail(teamId) {
  navStack.push({ type: 'team-detail', teamId });
  document.getElementById('topbar').style.display = 'flex';
  const team = getTeamById(teamId);
  document.getElementById('topbar-title').textContent = team ? team.name : 'йҺҙж©Җж§Ұз’ҮпёҪе„Ҹ';

  // й—…ж„ҜжЈҢtabbarй”ӣе ЈоҮӣйҺҜе‘ҙгҖүеЁҢеӨӢи№ҲеҜ®еҝҺз¶ӢжҘ еІӢзҙқйҚҷоҲһвӮ¬еӨӣзҙ°ж·ҮжҝҲжҡҖй”ӣ?
  // document.getElementById('tabbar').style.display = 'none';

  const pc = document.getElementById('page-content');
  pc.innerHTML = '';
  pc.appendChild(renderTeamDetail(teamId));
  pc.scrollTop = 0;
}

function goBack() {
  navStack.pop();
  if (navStack.length === 0) {
    document.getElementById('topbar').style.display = 'none';
    document.getElementById('tabbar').style.display = 'flex';
    render();
  } else {
    const last = navStack[navStack.length - 1];
    if (last.type === 'team-detail') goTeamDetail(last.teamId);
  }
}

function render() {
  const pc = document.getElementById('page-content');
  pc.innerHTML = '';
  pc.scrollTop = 0;

  if (currentTab === 'home') {
    pc.appendChild(renderHome());
  } else if (currentTab === 'teams') {
    pc.appendChild(renderTeams(searchKeyword));
  } else if (currentTab === 'ranking') {
    pc.appendChild(renderRanking(rankTab));
  }
}

/* ==================== йҚ’жҝҶоқҗйҚ–?==================== */
render();
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>瑶光团战积分系统</title>
<style>
  /* ===== 全局重置 ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d1f;
    --bg2: #13132b;
    --card: #1a1a35;
    --card2: #22224a;
    --nav: #111128;
    --gold: #C8A84B;
    --gold2: #e8c867;
    --text: #e8e8f0;
    --text2: #9999bb;
    --border: rgba(200,168,75,0.18);
    --radius: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 14px; overflow: hidden; }
  
  /* ===== 布局容器 ===== */
  #app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; position: relative; background: var(--bg); box-shadow: 0 0 40px rgba(0,0,0,0.6); }
  
  /* ===== 内容区域 ===== */
  .page-content { flex: 1; overflow-y: auto; padding-bottom: 70px; }
  .page-content::-webkit-scrollbar { display: none; }
  
  /* ===== 顶部导航栏 ===== */
  .topbar { background: #111128; padding: 14px 16px 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .topbar-back { width: 32px; height: 32px; border-radius: 50%; background: rgba(200,168,75,0.15); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--gold); font-size: 16px; }
  .topbar-title { font-size: 16px; font-weight: 700; color: var(--text); }
  
  /* ===== 底部TabBar ===== */
  #tabbar { background: var(--nav); border-top: 1px solid var(--border); display: flex; position: sticky; bottom: 0; z-index: 200; flex-shrink: 0; }
  .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 8px; cursor: pointer; transition: color 0.2s; color: #666688; gap: 3px; }
  .tab-item.active { color: var(--gold); }
  .tab-item .tab-icon { font-size: 20px; }
  .tab-item .tab-label { font-size: 11px; font-weight: 500; }
  
  /* ===== 通用卡片 ===== */
  .card { background: var(--card); border-radius: var(--radius); padding: 16px; margin: 10px 14px; box-shadow: var(--shadow); border: 1px solid var(--border); }
  .section { margin: 0 0 4px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 14px 6px; }
  .section-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .section-more { font-size: 13px; color: var(--gold); cursor: pointer; }
  .empty-tip { text-align: center; padding: 40px; color: var(--text2); }

  /* ===== 搜索框 ===== */
  .search-wrap { padding: 10px 14px 4px; }
  .search-input { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 24px; padding: 9px 16px; color: var(--text); font-size: 14px; outline: none; }
  .search-input::placeholder { color: var(--text2); }
  .search-input:focus { border-color: var(--gold); }

  /* ==================== 首页 ==================== */
  .hero { background: linear-gradient(160deg, #1c1c4a 0%, #0d0d1f 100%); padding: 28px 16px 22px; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: -30px; right: -20px; width: 160px; height: 160px; background: radial-gradient(circle, rgba(200,168,75,0.12) 0%, transparent 70%); pointer-events: none; }
  .hero-badge { display: inline-block; background: rgba(200,168,75,0.15); border: 1px solid rgba(200,168,75,0.4); color: var(--gold); font-size: 11px; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px; }
  .hero-title { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: 2px; }
  .hero-subtitle { font-size: 14px; color: var(--text2); margin-top: 4px; }
  .overview-row { display: flex; margin-top: 20px; background: rgba(255,255,255,0.04); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
  .ov-item { flex: 1; padding: 14px 0; text-align: center; }
  .ov-item:not(:last-child) { border-right: 1px solid var(--border); }
  .ov-num { display: block; font-size: 24px; font-weight: 800; color: var(--gold); }
  .ov-lbl { display: block; font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* 首页TOP3 */
  .top3-list { padding: 0 14px; display: flex; flex-direction: column; gap: 10px; }
  .top3-item { background: var(--card); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border); cursor: pointer; transition: border-color 0.2s; }
  .top3-item:hover { border-color: var(--gold); }
  .top3-rank { font-size: 22px; width: 28px; text-align: center; }
  .top3-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .top3-info { flex: 1; }
  .top3-name { display: block; font-size: 15px; font-weight: 700; }
  .top3-captain { display: block; font-size: 12px; color: var(--text2); margin-top: 2px; }
  .top3-score { font-size: 20px; font-weight: 800; color: var(--gold); }

  /* 最近赛事 */
  .latest-card { margin: 0 14px; background: var(--card); border-radius: 12px; padding: 14px 16px; border: 1px solid var(--border); }
  .latest-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .latest-name { font-size: 15px; font-weight: 700; }
  .latest-badge { background: rgba(200,168,75,0.15); border: 1px solid rgba(200,168,75,0.4); color: var(--gold); font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .latest-date { font-size: 12px; color: var(--text2); }
  .latest-desc { font-size: 13px; color: var(--text2); margin-top: 6px; }

  /* 个人TOP5 */
  .mr-list { padding: 0 14px; display: flex; flex-direction: column; gap: 8px; }
  .mr-item { background: var(--card); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); }
  .mr-rank { width: 24px; font-size: 14px; font-weight: 800; color: var(--text2); text-align: center; }
  .mr-rank.top1 { color: #FFD700; }
  .mr-rank.top2 { color: #C0C0C0; }
  .mr-rank.top3 { color: #CD7F32; }
  .mr-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--card2); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: var(--gold); border: 1px solid var(--border); }
  .mr-info { flex: 1; }
  .mr-name { display: block; font-size: 14px; font-weight: 600; }
  .mr-team { display: block; font-size: 12px; color: var(--text2); margin-top: 1px; }
  .mr-score { font-size: 18px; font-weight: 800; color: var(--gold); }

  /* 快捷按钮 */
  .entry-btn { margin: 8px 14px 0; background: linear-gradient(135deg, rgba(200,168,75,0.2), rgba(200,168,75,0.08)); border: 1px solid rgba(200,168,75,0.4); border-radius: 12px; padding: 14px; text-align: center; font-size: 15px; font-weight: 700; color: var(--gold); cursor: pointer; transition: background 0.2s; }
  .entry-btn:hover { background: rgba(200,168,75,0.25); }

  /* ==================== 战队列表 ==================== */
  .team-list { padding: 0 14px; display: flex; flex-direction: column; gap: 10px; }
  .team-card { background: var(--card); border-radius: 14px; padding: 14px; display: flex; gap: 12px; border: 1px solid var(--border); cursor: pointer; transition: border-color 0.2s, transform 0.15s; }
  .team-card:hover { border-color: var(--gold); transform: translateY(-1px); }
  .card-left { flex-shrink: 0; }
  .team-avatar { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .card-right { flex: 1; min-width: 0; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .team-name { font-size: 16px; font-weight: 800; }
  .team-score { font-size: 18px; font-weight: 800; color: var(--gold); }
  .team-captain { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .team-desc { font-size: 13px; color: var(--text2); margin-bottom: 8px; line-height: 1.4; }
  .member-preview { display: flex; flex-wrap: wrap; gap: 4px; }
  .mp-tag { background: var(--card2); border-radius: 6px; padding: 2px 8px; font-size: 11px; color: var(--text2); }

  /* ==================== 战队详情 ==================== */
  .team-hero-detail { padding: 22px 16px 18px; position: relative; overflow: hidden; }
  .hero-top { display: flex; align-items: center; gap: 14px; }
  .hero-avatar-lg { width: 68px; height: 68px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 34px; flex-shrink: 0; }
  .hero-info-text { flex: 1; }
  .hero-name-lg { font-size: 20px; font-weight: 900; color: #fff; }
  .hero-captain-lg { font-size: 13px; color: var(--gold); margin-top: 3px; }
  .hero-desc-lg { font-size: 13px; color: var(--text2); margin-top: 5px; line-height: 1.4; }
  
  .stats-bar { display: flex; background: var(--card2); margin: 0 14px; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
  .stat-box { flex: 1; padding: 12px 0; text-align: center; }
  .stat-box:not(:last-child) { border-right: 1px solid var(--border); }
  .stat-val { display: block; font-size: 22px; font-weight: 800; }
  .stat-lbl { display: block; font-size: 11px; color: var(--text2); margin-top: 2px; }

  .member-list { padding: 0 14px; display: flex; flex-direction: column; gap: 8px; }
  .member-card { background: var(--card); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); }
  .member-rank { width: 28px; text-align: center; }
  .captain-badge { background: rgba(200,168,75,0.2); border: 1px solid rgba(200,168,75,0.5); color: var(--gold); font-size: 10px; padding: 2px 5px; border-radius: 6px; }
  .member-idx { font-size: 13px; color: var(--text2); font-weight: 700; }
  .member-avatar-box { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; color: #fff; }
  .member-info { flex: 1; }
  .member-name { font-size: 14px; font-weight: 700; }
  .member-sub { display: block; font-size: 12px; color: var(--text2); margin-top: 2px; }
  .member-score-box { text-align: right; }
  .member-total-score { display: block; font-size: 18px; font-weight: 800; color: var(--gold); }
  .member-score-label { display: block; font-size: 11px; color: var(--text2); }

  .history-list { padding: 0 14px; display: flex; flex-direction: column; gap: 8px; }
  .history-item { background: var(--card); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); }
  .history-rank { font-size: 20px; width: 36px; text-align: center; }
  .history-rank-text { font-size: 13px; color: var(--text2); font-weight: 600; }
  .history-info { flex: 1; }
  .history-name { display: block; font-size: 14px; font-weight: 700; }
  .history-date { display: block; font-size: 12px; color: var(--text2); margin-top: 2px; }
  .history-score { font-size: 18px; font-weight: 800; color: #4ecdc4; }
  .history-members { font-size: 11px; color: var(--text2); margin-top: 4px; line-height: 1.5; }

  /* ==================== 排行榜 ==================== */
  .rank-tabs { display: flex; background: var(--card2); margin: 10px 14px 0; border-radius: 10px; padding: 3px; border: 1px solid var(--border); }
  .rank-tab { flex: 1; padding: 8px 0; text-align: center; font-size: 13px; font-weight: 600; color: var(--text2); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .rank-tab.active { background: var(--gold); color: #111; }

  /* 颁奖台 */
  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 8px; padding: 20px 14px 14px; }
  .podium-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
  .podium-avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .podium-avatar.p1 { width: 58px; height: 58px; font-size: 28px; }
  .podium-avatar.p2, .podium-avatar.p3 { width: 46px; height: 46px; }
  .podium-name { font-size: 12px; font-weight: 700; margin-top: 6px; text-align: center; max-width: 70px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .podium-score { font-size: 13px; font-weight: 800; color: var(--gold); }
  .podium-stand { display: flex; align-items: center; justify-content: center; width: 70px; border-radius: 6px 6px 0 0; margin-top: 6px; font-size: 16px; }
  .podium-stand.s1 { height: 60px; background: linear-gradient(180deg, #C8A84B, #a8882b); }
  .podium-stand.s2 { height: 44px; background: linear-gradient(180deg, #9e9e9e, #757575); }
  .podium-stand.s3 { height: 32px; background: linear-gradient(180deg, #a0826d, #795548); }

  .rank-list { padding: 0 14px; display: flex; flex-direction: column; gap: 8px; }
  .rank-item { background: var(--card); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); cursor: pointer; transition: border-color 0.2s; }
  .rank-item:hover { border-color: var(--gold); }
  .rank-num { width: 24px; font-size: 14px; font-weight: 800; text-align: center; color: var(--text2); }
  .rank-num.r1 { color: #FFD700; }
  .rank-num.r2 { color: #C0C0C0; }
  .rank-num.r3 { color: #CD7F32; }
  .rank-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .rank-info { flex: 1; }
  .rank-name { display: block; font-size: 14px; font-weight: 700; }
  .rank-sub { display: block; font-size: 12px; color: var(--text2); margin-top: 2px; }
  .rank-score { font-size: 18px; font-weight: 800; color: var(--gold); }
  .rank-wins { font-size: 11px; color: var(--text2); text-align: right; margin-top: 2px; }

  /* 赛事记录 */
  .activity-list { padding: 0 14px; display: flex; flex-direction: column; gap: 10px; }
  .activity-card { background: var(--card); border-radius: 12px; padding: 14px 16px; border: 1px solid var(--border); }
  .act-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .act-name { font-size: 15px; font-weight: 800; }
  .act-badge { background: rgba(200,168,75,0.15); border: 1px solid rgba(200,168,75,0.4); color: var(--gold); font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .act-date { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .act-desc { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
  .act-results { display: flex; flex-direction: column; gap: 5px; }
  .act-result-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .act-result-rank { width: 28px; text-align: center; font-size: 16px; }
  .act-result-rank-text { font-size: 12px; color: var(--text2); width: 28px; text-align: center; }
  .act-result-team { flex: 1; color: var(--text); font-weight: 500; }
  .act-result-score { color: var(--gold); font-weight: 800; }

  /* ===== 个人积分条 ===== */
  .score-bars { padding: 4px 0; }
  .score-bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .score-bar-label { font-size: 11px; color: var(--text2); width: 60px; text-align: right; }
  .score-bar-track { flex: 1; height: 6px; background: var(--card2); border-radius: 3px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--gold), var(--gold2)); transition: width 0.6s ease; }
  .score-bar-val { font-size: 11px; color: var(--text2); width: 28px; }

  /* ===== 分隔条 ===== */
  .spacer { height: 12px; }
  .spacer-sm { height: 6px; }
</style>
</head>

/* ==================== 计算数据 ==================== */
function calcTeamTotals() {
  const totals = {};
  teamsData.forEach(t => { totals[t.id] = { totalScore: 0, wins: 0, participations: 0 }; });
  activitiesData.forEach(act => {
    act.teamScores.forEach(ts => {
      if (totals[ts.teamId]) {
        totals[ts.teamId].totalScore += ts.score;
        totals[ts.teamId].participations++;
        if (ts.rank === 1) totals[ts.teamId].wins++;
      }
    });
  });
  return totals;
}

const teamTotals = calcTeamTotals();
const teamRanking = teamsData
  .map(t => ({ ...t, ...teamTotals[t.id] }))
  .sort((a, b) => b.totalScore - a.totalScore)
  .map((t, i) => ({ ...t, rank: i + 1 }));

const memberRanking = [...memberScores]
  .sort((a, b) => b.total - a.total)
  .map((m, i) => ({ ...m, rank: i + 1 }));

/* ==================== 工具函数 ==================== */
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'style') el.style.cssText = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  children.flat(Infinity).forEach(c => {
    if (c === null || c === undefined) return;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
}

function getRankEmoji(rank) {
  if (rank === 1) return '🥇';
  if (rank === 2) return '🥈';
  if (rank === 3) return '🥉';
  return null;
}

function getTeamById(id) { return teamsData.find(t => t.id === id); }

function renderTeams(keyword) {
  keyword = (keyword || '').trim();
  let filtered = teamsData
    .map(t => ({ ...t, totalScore: teamTotals[t.id].totalScore }))
    .sort((a, b) => b.totalScore - a.totalScore);

  if (keyword) {
    filtered = filtered.filter(t =>
      t.name.includes(keyword) ||
      t.captain.includes(keyword) ||
      t.members.some(m => m.name.includes(keyword))
    );
  }

  const frag = document.createDocumentFragment();

  // 搜索框
  const searchWrap = h('div', { class: 'search-wrap' });
  const input = h('input', { class: 'search-input', type: 'text', placeholder: '搜索战队名/队长/成员...', value: keyword });
  let searchTimer;
  input.addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchKeyword = e.target.value;
      const pc = document.getElementById('page-content');
      const scrollTop = pc.scrollTop;
      pc.innerHTML = '';
      pc.appendChild(renderTeams(searchKeyword));
      pc.scrollTop = scrollTop;
    }, 200);
  });
  searchWrap.appendChild(input);
  frag.appendChild(searchWrap);

  // 战队列表
  const list = h('div', { class: 'team-list' });
  if (filtered.length === 0) {
    list.appendChild(h('div', { class: 'empty-tip' }, '没有找到匹配的战队'));
  } else {
    filtered.forEach(team => {
      const card = h('div', { class: 'team-card', onclick: () => goTeamDetail(team.id) },
        h('div', { class: 'card-left' },
          h('div', { class: 'team-avatar', style: `background:${team.color}` }, team.avatar)
        ),
        h('div', { class: 'card-right' },
          h('div', { class: 'card-header' },
            h('span', { class: 'team-name' }, team.name),
            h('span', { class: 'team-score' }, String(team.totalScore) + '分')
          ),
          h('div', { class: 'team-captain' }, '队长：' + team.captain),
          h('div', { class: 'team-desc' }, team.description),
          h('div', { class: 'member-preview' },
            ...team.members.map(m => h('span', { class: 'mp-tag' }, m.name))
          )
        )
      );
      list.appendChild(card);
    });
  }
  frag.appendChild(list);
  frag.appendChild(h('div', { class: 'spacer' }));
  return frag;
}

/* ----- 战队详情 ----- */
function renderTeamDetail(teamId) {
  const team = getTeamById(teamId);
  if (!team) return h('div', {}, '战队不存在');

  // 比赛历史
  const history = [];
  activitiesData.forEach(act => {
    const ts = act.teamScores.find(s => s.teamId === teamId);
    if (ts) history.push({ name: act.name, date: act.date, score: ts.score, rank: ts.rank, members: ts.members });
  });

  // 成员积分详情
  const memberDetails = team.members.map(m => {
    const ms = memberScores.find(s => s.name === m.name);
    return { ...m, totalScore: ms ? ms.total : 0, scores: ms ? ms.scores : [0,0,0,0] };
  }).sort((a, b) => b.totalScore - a.totalScore);

  const totalScore = history.reduce((s, h) => s + h.score, 0);
  const maxMemberScore = Math.max(...memberDetails.map(m => m.totalScore), 1);

  const frag = document.createDocumentFragment();

  // 英雄区
  const heroEl = h('div', { class: 'team-hero-detail', style: `background: linear-gradient(135deg, ${team.color}33 0%, #0a0a1a 100%)` },
    h('div', { class: 'hero-top' },
      h('div', { class: 'hero-avatar-lg', style: `background:${team.color}` }, team.avatar),
      h('div', { class: 'hero-info-text' },
        h('div', { class: 'hero-name-lg' }, team.name),
        h('div', { class: 'hero-captain-lg' }, '👑 队长：' + team.captain),
        h('div', { class: 'hero-desc-lg' }, team.description)
      )
    )
  );
  frag.appendChild(heroEl);

  // 数据统计栏
  const statsBar = h('div', { class: 'stats-bar' },
    h('div', { class: 'stat-box' },
      h('span', { class: 'stat-val', style: `color:${team.color}` }, String(totalScore)),
      h('span', { class: 'stat-lbl' }, '累计积分')
    ),
    h('div', { class: 'stat-box' },
      h('span', { class: 'stat-val', style: 'color:#ffd700' }, String(history.length)),
      h('span', { class: 'stat-lbl' }, '参赛场次')
    ),
    h('div', { class: 'stat-box' },
      h('span', { class: 'stat-val', style: 'color:#4ecdc4' }, String(team.members.length)),
      h('span', { class: 'stat-lbl' }, '成员人数')
    )
  );
  frag.appendChild(statsBar);
  frag.appendChild(h('div', { class: 'spacer-sm' }));

  // 队员阵容
  const memberSection = h('div', { class: 'section' },
    h('div', { class: 'section-header' }, h('span', { class: 'section-title' }, '⚔️ 队员阵容')),
    h('div', { class: 'member-list' },
      ...memberDetails.map((m, i) => {
        const barWidth = maxMemberScore > 0 ? Math.round(m.totalScore / maxMemberScore * 100) : 0;
        return h('div', { class: 'member-card' },
          h('div', { class: 'member-rank' },
            m.isCaptain
              ? h('span', { class: 'captain-badge' }, '队长')
              : h('span', { class: 'member-idx' }, String(i + 1))
          ),
          h('div', { class: 'member-avatar-box', style: `background:${team.color}` }, m.name[0]),
          h('div', { class: 'member-info' },
            h('div', { class: 'member-name' }, m.name),
            h('div', { class: 'member-sub' }, m.weapon + ' | 战力：' + m.score),
            h('div', { class: 'score-bar-track', style: 'margin-top:5px' },
              h('div', { class: 'score-bar-fill', style: `width:${barWidth}%` })
            )
          ),
          h('div', { class: 'member-score-box' },
            h('span', { class: 'member-total-score' }, String(m.totalScore)),
            h('span', { class: 'member-score-label' }, '积分')
          )
        );
      })
    )
  );
  frag.appendChild(memberSection);

  // 比赛历史
  const histSection = h('div', { class: 'section' },
    h('div', { class: 'section-header' }, h('span', { class: 'section-title' }, '📊 比赛历史')),
    history.length === 0
      ? h('div', { class: 'empty-tip' }, '暂无比赛记录')
      : h('div', { class: 'history-list' },
          ...history.reverse().map(hi => {
            const emoji = getRankEmoji(hi.rank);
            return h('div', { class: 'history-item' },
              h('div', { class: 'history-rank' },
                emoji
                  ? h('span', {}, emoji)
                  : h('span', { class: 'history-rank-text' }, '第' + hi.rank + '名')
              ),
              h('div', { class: 'history-info' },
                h('span', { class: 'history-name' }, hi.name),
                h('span', { class: 'history-date' }, hi.date),
                h('div', { class: 'history-members' }, hi.members.join(' · '))
              ),
              h('span', { class: 'history-score' }, '+' + hi.score)
            );
          })
        )
  );
  frag.appendChild(histSection);
  frag.appendChild(h('div', { class: 'spacer' }));

  return frag;
}

/* ----- 排行榜 ----- */
function renderRanking(tab) {
  tab = tab !== undefined ? tab : rankTab;
  rankTab = tab;
  const frag = document.createDocumentFragment();

  // Tab切换
  const tabBar = h('div', { class: 'rank-tabs' },
    h('div', { class: `rank-tab ${tab===0?'active':''}`, onclick: () => rerenderRanking(0) }, '⚔️ 战队'),
    h('div', { class: `rank-tab ${tab===1?'active':''}`, onclick: () => rerenderRanking(1) }, '👤 个人'),
    h('div', { class: `rank-tab ${tab===2?'active':''}`, onclick: () => rerenderRanking(2) }, '📋 赛事')
  );
  frag.appendChild(tabBar);
  frag.appendChild(h('div', { class: 'spacer-sm' }));

  if (tab === 0) {
    // 战队排名 - 颁奖台
    const p = teamRanking;
    const podium = h('div', { class: 'podium' },
      // 第二名
      h('div', { class: 'podium-item', onclick: () => goTeamDetail(p[1].id) },
        h('div', { class: 'podium-avatar p2', style: `background:${p[1].color}` }, p[1].avatar),
        h('div', { class: 'podium-name' }, p[1].name),
        h('div', { class: 'podium-score' }, String(p[1].totalScore)),
        h('div', { class: 'podium-stand s2' }, '🥈')
      ),
      // 第一名
      h('div', { class: 'podium-item', onclick: () => goTeamDetail(p[0].id) },
        h('div', { class: 'podium-avatar p1', style: `background:${p[0].color}` }, p[0].avatar),
        h('div', { class: 'podium-name' }, p[0].name),
        h('div', { class: 'podium-score' }, String(p[0].totalScore)),
        h('div', { class: 'podium-stand s1' }, '🥇')
      ),
      // 第三名
      h('div', { class: 'podium-item', onclick: () => goTeamDetail(p[2].id) },
        h('div', { class: 'podium-avatar p3', style: `background:${p[2].color}` }, p[2].avatar),
        h('div', { class: 'podium-name' }, p[2].name),
        h('div', { class: 'podium-score' }, String(p[2].totalScore)),
        h('div', { class: 'podium-stand s3' }, '🥉')
      )
    );
    frag.appendChild(podium);

    // 完整列表（4名起）
    const list = h('div', { class: 'rank-list' });
    teamRanking.slice(3).forEach(team => {
      list.appendChild(h('div', { class: 'rank-item', onclick: () => goTeamDetail(team.id) },
        h('div', { class: 'rank-num' }, String(team.rank)),
        h('div', { class: 'rank-avatar', style: `background:${team.color}` }, team.avatar),
        h('div', { class: 'rank-info' },
          h('span', { class: 'rank-name' }, team.name),
          h('span', { class: 'rank-sub' }, '队长：' + team.captain + ' · ' + team.members.length + '人')
        ),
        h('div', {},
          h('div', { class: 'rank-score' }, String(team.totalScore)),
          h('div', { class: 'rank-wins' }, team.wins + '冠 ' + team.participations + '场')
        )
      ));
    });
    frag.appendChild(list);

  } else if (tab === 1) {
    // 个人排名
    const maxScore = memberRanking[0].total || 1;
    const list = h('div', { class: 'rank-list' });
    memberRanking.forEach(m => {
      const barW = Math.round(m.total / maxScore * 100);
      const rankCls = m.rank === 1 ? 'r1' : m.rank === 2 ? 'r2' : m.rank === 3 ? 'r3' : '';
      const emoji = getRankEmoji(m.rank);
      list.appendChild(h('div', { class: 'rank-item' },
        h('div', { class: `rank-num ${rankCls}` }, emoji || String(m.rank)),
        h('div', { class: 'rank-avatar', style: 'background:var(--card2);font-size:16px;color:var(--gold);font-weight:700' }, m.name[0]),
        h('div', { class: 'rank-info' },
          h('span', { class: 'rank-name' }, m.name),
          h('span', { class: 'rank-sub' }, m.team + ' · ' + m.weapon),
          h('div', { class: 'score-bar-track', style: 'margin-top:5px' },
            h('div', { class: 'score-bar-fill', style: `width:${barW}%` })
          )
        ),
        h('div', { class: 'rank-score' }, String(m.total))
      ));
    });
    frag.appendChild(list);

  } else {
    // 赛事记录
    const list = h('div', { class: 'activity-list' });
    [...activitiesData].reverse().forEach(act => {
      const sortedScores = [...act.teamScores].sort((a, b) => a.rank - b.rank);
      const card = h('div', { class: 'activity-card' },
        h('div', { class: 'act-header' },
          h('span', { class: 'act-name' }, act.name),
          h('span', { class: 'act-badge' }, act.status)
        ),
        h('div', { class: 'act-date' }, act.date + ' · ' + act.type),
        h('div', { class: 'act-desc' }, act.desc),
        h('div', { class: 'act-results' },
          ...sortedScores.map(ts => {
            const team = getTeamById(ts.teamId);
            const emoji = getRankEmoji(ts.rank);
            return h('div', { class: 'act-result-item' },
              emoji
                ? h('span', { class: 'act-result-rank' }, emoji)
                : h('span', { class: 'act-result-rank-text' }, '第' + ts.rank),
              h('span', { class: 'act-result-team' }, team ? team.name : '未知战队'),
              h('span', { class: 'act-result-score' }, '+' + ts.score)
            );
          })
        )
      );
      list.appendChild(card);
    });
    frag.appendChild(list);
  }

  frag.appendChild(h('div', { class: 'spacer' }));
  return frag;
}

function rerenderRanking(tab) {
  rankTab = tab;
  const pc = document.getElementById('page-content');
  pc.innerHTML = '';
  pc.appendChild(renderRanking(tab));
  pc.scrollTop = 0;
}

function setRankTab(tab) {
  rerenderRanking(tab);
}

/* ==================== 路由 ==================== */
function switchTab(tab) {
  currentTab = tab;
  navStack = [];
  searchKeyword = '';

  // 更新tabbar
  document.querySelectorAll('.tab-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });

  // 隐藏/显示顶部栏
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('tabbar').style.display = 'flex';

  render();
}

function goTeamDetail(teamId) {
  navStack.push({ type: 'team-detail', teamId });
  document.getElementById('topbar').style.display = 'flex';
  const team = getTeamById(teamId);
  document.getElementById('topbar-title').textContent = team ? team.name : '战队详情';

  // 隐藏tabbar（详情页沉浸式体验，可选：保留）
  // document.getElementById('tabbar').style.display = 'none';

  const pc = document.getElementById('page-content');
  pc.innerHTML = '';
  pc.appendChild(renderTeamDetail(teamId));
  pc.scrollTop = 0;
}

function goBack() {
  navStack.pop();
  if (navStack.length === 0) {
    document.getElementById('topbar').style.display = 'none';
    document.getElementById('tabbar').style.display = 'flex';
    render();
  } else {
    const last = navStack[navStack.length - 1];
    if (last.type === 'team-detail') goTeamDetail(last.teamId);
  }
}

function render() {
  const pc = document.getElementById('page-content');
  pc.innerHTML = '';
  pc.scrollTop = 0;

  if (currentTab === 'home') {
    pc.appendChild(renderHome());
  } else if (currentTab === 'teams') {
    pc.appendChild(renderTeams(searchKeyword));
  } else if (currentTab === 'ranking') {
    pc.appendChild(renderRanking(rankTab));
  }
}

/* ==================== 初始化 ==================== */
render();
</script>
</body>
</html>
